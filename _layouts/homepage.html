---
layout: default
---

<div id="marine-bg"></div>
<div id="marine-particles"></div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  document.body.classList.add("homepage-layout");

  const container = document.getElementById("marine-particles");
  if (!container) return;

  for (let i = 0; i < 140; i++) {
    const p = document.createElement("div");
    const sizeClass = Math.random() < 0.6 ? "small" : (Math.random() < 0.85 ? "medium" : "large");
    p.className = "marine-particle " + sizeClass;

    const size = sizeClass === "small" ? (Math.random() * 2 + 1) :
                 sizeClass === "medium" ? (Math.random() * 4 + 2) :
                 (Math.random() * 7 + 4);

    p.style.width = size + "px";
    p.style.height = size + "px";
    p.style.left = Math.random() * 100 + "vw";
    p.style.top = (100 + Math.random() * 30) + "vh";
    p.style.animationDuration = (20 + Math.random() * 30) + "s";
    p.style.animationDelay = (Math.random() * 20) + "s";

    container.appendChild(p);
  }
});
</script>

<div id="marine-hero">
  {% if page.title %}
    <div class="hero-title">
      <h1>{{ page.title | markdownify }}</h1>
    </div>
  {% endif %}

  <div class="marine-scene">
    <div class="marine-system">
      <div class="marine-current"></div>

      <div class="marine-node node-1">
        <div class="marine-label"></div>
      </div>
      <div class="marine-node node-2">
        <div class="marine-label"></div>
      </div>
      <div class="marine-node node-3">
        <div class="marine-label"></div>
      </div>
      <div class="marine-node node-4">
        <div class="marine-label"></div>
      </div>
    </div>
  </div>

  {% if page.bio %}
    <div class="hero-bio">
      <p>{{ page.bio | markdownify }}</p>
    </div>
  {% endif %}

  <div class="scroll-arrow"></div>
</div>

{% include base_path %}

<div id="main" role="main">
  {% include sidebar.html %}

  <article class="page" itemscope itemtype="http://schema.org/CreativeWork">
    {% if page.title %}
      <meta itemprop="headline" content="{{ page.title | markdownify | strip_html | strip_newlines | escape_once }}">
    {% endif %}

    {% if page.excerpt %}
      <meta itemprop="description" content="{{ page.excerpt | markdownify | strip_html | strip_newlines | escape_once }}">
    {% endif %}

    <div class="page__inner-wrap">
      <section class="page__content" itemprop="text">
        {{ content }}
      </section>
    </div>
  </article>
</div>
